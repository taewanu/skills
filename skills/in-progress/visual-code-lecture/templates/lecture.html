<!DOCTYPE html>
<!--
  visual-code-lecture page template. One self-contained file — a guided, hand-drawn walkthrough you SCROLL.
  Scrollytelling: the code is PINNED on the left; you scroll the notes down the right and the one
  in the focus band becomes active — its lines light up (the rest dim), a rough.js mark is sketched
  on them, and a rough.js connector arcs from the active note to the line. One note in focus at a
  time, so it stays a guided lecture. The control bar can still jump (◀ ▶ / arrow keys / dot / click a line).

  Fill these regions before opening:
    1. <title> and [data-title] — what you're teaching
    2. [data-subject] — the file / function / subsystem this walks
    3. .code-panel .file-head [data-path] / [data-meta] — the path and a "tsx · L1–N" meta on the panel
    4. .code-panel .lines — the real code, one <div class="line" data-ln="N"> per row
       (data-ln is the number you'll reference from beats; it need not start at 1)
    5. <ol id="beats"> — one <li class="beat"> per step; JS builds the scrolling note cards from it
    6. (optional) the .skipped coverage note when you only walk part of the code

  Mechanics — rough.js (embedded), the scroll-driven activation + sticky layout, spotlight,
  draw-on animation, theme/wrap, the Marker ink palette, click-to-copy / copy-transcript — are solved;
  copy <style> and <script> verbatim. Notes use seeded rough shapes so they stay glued (no shimmer)
  while you scroll, and the active mark recolors live when the reader picks a Marker swatch. Only the
  chrome (the PALETTE list of marker inks, note width, which mark per beat) is yours to tweak.

  NOTE: code text is literal HTML — escape it: &lt; &gt; &amp; (write &amp;lt; &amp;gt; &amp;amp; in source).
-->
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__TITLE__ — code lecture</title>
    <style>
      :root, [data-theme="dark"] {
        --bg: #0d1117; --bg-elev: #161b22; --fg: #e6edf3; --fg-muted: #8b949e; --border: #30363d;
        --accent: #58a6ff; --ln-fg: #6e7681; --mark: #38bdf8; --note-bg: #161b22; --note-fg: #e6edf3; --chip-bg: rgba(110,118,129,0.22); --dim: 0.34;
      }
      [data-theme="light"] {
        --bg: #fbfaf7; --bg-elev: #ffffff; --fg: #1f2328; --fg-muted: #656d76; --border: #d8dce0;
        --accent: #0969da; --ln-fg: #aab1b9; --mark: #0284c7; --note-bg: #ffffff; --note-fg: #1f2328; --chip-bg: rgba(110,118,129,0.14); --dim: 0.36;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      html, body { background: var(--bg); color: var(--fg); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 15px; line-height: 1.55; transition: background 160ms ease, color 160ms ease; }
      code, .code, .ln { font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace; }
      a { color: var(--accent); text-decoration: none; }
      .hand { font-family: "Comic Sans MS", "Bradley Hand", "Segoe Print", ui-rounded, "Marker Felt", cursive; }

      .topbar { position: sticky; top: 0; z-index: 40; display: flex; align-items: center; gap: 14px; padding: 14px 22px; background: var(--bg); border-bottom: 1px solid var(--border); }
      .topbar h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
      .topbar .subject { font-family: ui-monospace, monospace; font-size: 11.5px; color: var(--fg); padding: 2px 8px; border-radius: 6px; background: var(--bg-elev); border: 1px solid var(--border); }
      .topbar .push { margin-left: auto; }
      /* independent action badges (Wrap and theme are unrelated, so not a segmented group) */
      .topbar .badge-btn { all: unset; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; padding: 4px 11px; border-radius: 9999px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--fg-muted); font-size: 12px; line-height: 1; transition: background 120ms ease, color 120ms ease, border-color 120ms ease; }
      .topbar .badge-btn:hover { color: var(--fg); border-color: var(--fg-muted); }
      .topbar .badge-btn.active { color: var(--fg); border-color: var(--mark); background: var(--chip-bg); }
      /* live marker-ink palette: the reader picks the highlight color */
      .marker { display: inline-flex; align-items: center; gap: 7px; padding: 3px 9px 3px 11px; border-radius: 9999px; border: 1px solid var(--border); background: var(--bg-elev); }
      .marker .label { font-size: 11px; color: var(--fg-muted); letter-spacing: 0.02em; }
      .marker .swatches { display: inline-flex; gap: 5px; }
      .marker .swatch { all: unset; cursor: pointer; width: 14px; height: 14px; border-radius: 50%; background: var(--sw); box-shadow: inset 0 0 0 1px rgba(0,0,0,0.25); transition: transform 110ms ease; }
      .marker .swatch:hover { transform: scale(1.18); }
      .marker .swatch.active { box-shadow: 0 0 0 2px var(--bg-elev), 0 0 0 3.5px var(--sw); }

      /* fixed overlay for marks + connector (viewport coordinates) */
      .sketch { position: fixed; inset: 0; z-index: 4; pointer-events: none; overflow: visible; }
      .sketch path { stroke-linecap: round; stroke-linejoin: round; stroke-opacity: 0.6; } /* translucent ink so the code reads through the marks */
      /* tag = a GitHub-label pill: normal font, tinted fill, flat, no rotation */
      .tag { position: fixed; z-index: 6; background: color-mix(in srgb, var(--mark) 20%, var(--bg)); color: var(--mark); font-size: 11px; font-weight: 500; letter-spacing: 0.02em; padding: 2px 9px; border: 1px solid color-mix(in srgb, var(--mark) 55%, transparent); border-radius: 2em; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 200ms ease; }
      .tag.show { opacity: 1; }
      .tag.jump { pointer-events: auto; cursor: pointer; }
      .tag.jump:hover { filter: brightness(1.12); }
      /* clickable cross-link chip inside a note (keeps a two-beat relationship navigable) */
      .note-card .see-row { margin-top: 9px; display: flex; flex-wrap: wrap; gap: 6px; }
      .see-chip { display: inline-flex; align-items: center; gap: 3px; font: 11.5px ui-monospace, monospace; color: var(--note-fg); background: var(--chip-bg); border: 1px solid var(--border); border-radius: 9999px; padding: 2px 9px; cursor: pointer; }
      .see-chip:hover { border-color: var(--mark); color: var(--mark); }
      .note-step:not(.active) .note-card .see-chip { pointer-events: none; opacity: 0.4; }  /* a dimmed card's chip is inert — a click focuses the card first, then the chip is live */
      /* "↩ back" chip: dashed accent so it reads as return, vs the solid ↗ jump chips */
      .back-chip { all: unset; display: flex; width: fit-content; align-items: center; gap: 3px; margin: 9px 0 0; font: 600 11.5px ui-monospace, monospace; color: var(--mark); background: var(--bg); border: 1px dashed var(--mark); border-radius: 9999px; padding: 3px 10px; cursor: pointer; }
      .back-chip:hover { background: var(--mark); color: #0b0f14; }
      .line.flash-line { animation: flashln 1.1s ease; }
      @keyframes flashln { 0%, 100% { background: transparent; } 25% { background: color-mix(in srgb, var(--mark) 28%, transparent); } }

      .wrap { max-width: 1040px; margin: 0 auto; padding: 0 22px; }
      /* ===== Scrollytelling: code pinned left, notes scroll right ===== */
      .stage-layout { position: relative; display: grid; grid-template-columns: 1fr 360px; gap: 64px; align-items: start; }
      .code-col { position: sticky; top: 84px; align-self: start; min-width: 0; } /* min-width:0 lets long unwrapped lines scroll inside the panel instead of blowing out the grid column */
      .code-panel { position: relative; border: 1px solid var(--border); border-radius: 12px; background: var(--bg-elev); overflow: hidden; }
      .code-panel .file-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 9px 14px; border-bottom: 1px solid var(--border); background: var(--bg); }
      .code-panel .file-head .path { font-family: ui-monospace, monospace; font-size: 12.5px; color: var(--fg); }
      .code-panel .file-head .meta { font-family: ui-monospace, monospace; font-size: 11.5px; color: var(--fg-muted); }
      .code-panel .lines { padding: 10px 0; max-height: calc(100vh - 188px); overflow: auto; } /* cap to the viewport so the panel pans to the active line instead of running off-screen */
      .line { display: grid; grid-template-columns: 50px 1fr; font-size: 13px; line-height: 1.65; transition: opacity 220ms ease; cursor: pointer; }
      .line .ln { text-align: right; padding: 0 12px; color: var(--ln-fg); user-select: none; border-right: 1px solid var(--border); }
      .line .code { padding: 0 16px; white-space: pre; }
      body.wrap .line .code { white-space: pre-wrap; word-break: break-word; }
      .line.dim { opacity: var(--dim); }
      .line.spot .ln { color: var(--mark); }
      .skipped { color: var(--fg-muted); font-size: 13px; font-style: italic; margin-top: 12px; }

      .note-col { position: relative; }
      .note-step { min-height: 84vh; display: flex; align-items: flex-start; }
      .note-step:first-child { min-height: 64vh; }
      .note-step:last-child { min-height: 72vh; }
      /* GitHub PR-review comment card as the base; the rough.js pen is layered on top */
      .note-card { position: sticky; top: 38vh; width: 100%; cursor: pointer; opacity: 0.4;
        background: var(--note-bg); color: var(--note-fg); border: 1px solid var(--border);
        border-left: 3px solid var(--border); border-radius: 8px; padding: 13px 15px;
        box-shadow: 0 1px 2px rgba(0,0,0,0.28);
        transition: opacity 280ms ease, border-color 180ms ease, box-shadow 180ms ease; }
      .note-step.active .note-card { opacity: 1; border-left-color: var(--mark); box-shadow: 0 6px 20px rgba(0,0,0,0.32); }
      .note-step:not(.active) .note-card:hover { opacity: 0.78; }   /* lift a dimmed card on hover — it's a jump target */
      .note-card:hover { border-color: var(--mark); }
      .note-card.flash { border-color: var(--mark); border-left-color: var(--mark); }
      .note-card .note-num { display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; min-width: 20px; height: 20px; padding: 0 6px; margin: 0 8px 9px 0; border-radius: 9999px; background: var(--mark); color: #0b0f14; font: 600 11px ui-monospace, monospace; }
      .note-card .beat-ref { display: inline-block; vertical-align: middle; font-family: ui-monospace, monospace; font-size: 11.5px; color: var(--fg-muted); background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 1px 7px; margin-bottom: 9px; }
      .note-card .beat-text { font-size: 14.5px; line-height: 1.55; }
      .note-card .beat-text code { font-family: ui-monospace, monospace; font-size: 12.5px; background: var(--chip-bg); padding: 1px 5px; border-radius: 5px; }
      .note-card .beat-text .lead { display: block; font-weight: 600; }
      .note-card .beat-text ul { margin: 7px 0 0; padding-left: 1.15em; display: flex; flex-direction: column; gap: 4px; }
      .note-card .beat-text li { font-size: 14px; line-height: 1.45; }
      .note-card .cap-copy { position: absolute; right: 12px; bottom: 8px; font-family: ui-monospace, monospace; font-size: 11.5px; color: var(--fg-muted); opacity: 0; transition: opacity 120ms ease; }
      .note-card .cap-copy::before { content: "⧉ copy"; }
      .note-step:not(.active) .note-card .cap-copy::before { content: "↳ go to step"; }  /* dimmed card: a click navigates, doesn't copy */
      .note-card:hover .cap-copy { opacity: 1; }
      .note-card.flash .cap-copy::before { content: "✓ copied"; }

      .progress { display: flex; align-items: center; gap: 7px; }
      .dot { width: 11px; height: 11px; border-radius: 50%; border: 1.5px solid var(--border); cursor: pointer; background: transparent; transition: all 140ms ease; padding: 0; }
      .dot:hover { border-color: var(--mark); }
      .dot.done { background: var(--fg-muted); border-color: var(--fg-muted); opacity: 0.5; }
      .dot.current { background: var(--mark); border-color: var(--mark); transform: scale(1.25); opacity: 1; }

      .controlbar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 50; display: flex; align-items: center; gap: 12px; padding: 12px 22px; background: var(--bg); border-top: 1px solid var(--border); }
      .controlbar .count { font-family: ui-monospace, monospace; font-size: 12.5px; color: var(--fg-muted); }
      .controlbar .push { margin-left: auto; }
      .controlbar button { all: unset; cursor: pointer; padding: 8px 16px; border-radius: 9999px; border: 1px solid var(--border); background: var(--bg-elev); font-size: 13.5px; color: var(--fg); transition: background 120ms ease, opacity 120ms ease; }
      .controlbar button:hover { background: var(--border); }
      .controlbar button:disabled { opacity: 0.35; cursor: default; }
      .controlbar .next { background: var(--mark); border-color: var(--mark); color: #0b0f14; font-weight: 600; }
      .controlbar #copy-all { font-family: ui-monospace, monospace; font-size: 12px; color: var(--fg-muted); border-radius: 9999px; padding: 7px 14px; }
      .controlbar #copy-all.flash { color: #2ea043; border-color: #2ea043; }

      @media (max-width: 860px) {
        .stage-layout { grid-template-columns: 1fr; gap: 0; }
        .code-col { position: static; }
        .sketch { display: none; }
        .note-step { min-height: 0; margin-top: 20px; }
        .note-card { position: static; opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1 data-title>__TITLE__</h1>
      <span class="subject" data-subject>__file / function / subsystem__</span>
      <span class="push"></span>
      <div class="marker" id="marker" title="Marker ink color"><span class="label">Marker</span><span class="swatches" id="swatches"></span></div>
      <button id="wrap-toggle" class="badge-btn" title="Wrap long lines">Wrap</button>
      <button id="theme-toggle" class="badge-btn" title="Toggle light / dark">☀</button>
    </div>

    <svg class="sketch" id="sketch" aria-hidden="true"></svg>

    <div class="wrap">
      <div class="stage-layout">
        <div class="code-col">
          <div class="code-panel">
            <div class="file-head"><span class="path" data-path>__path / function__</span><span class="meta" data-meta>__lang · L1–N__</span></div>
            <div class="lines" id="lines">
              <!-- REPLACE THIS WHOLE COMMENT with the real code: one row per line, e.g. <div class="line" data-ln="40"><span class="ln">40</span><span class="code">  const tokens = lex(input);</span></div> — escape &lt; &gt; &amp; inside .code, and keep the closing arrow on this line so no stray text leaks into the panel. -->
            </div>
          </div>
          <!-- optional coverage note: <p class="skipped">Walked the hot path only — …</p> -->
        </div>
        <div class="note-col" id="note-col"><!-- JS builds one .note-step > .note-card per beat --></div>
      </div>
    </div>

    <!-- Beats: the lecture script (hidden source of truth; JS renders the scrolling cards).
         data-lines : which line(s) to spotlight — "41" | "41-44" | "41,47,50"
         data-mark  : circle (default) | box | underline | strike | highlight | none
         data-to    : optional second range → in-code connector (off-screen → clickable ↑L<n> edge marker)
         data-see   : optional line(s) → clickable "↗ jump to L<n>" chip(s) in the note (the two-beat link)
         data-tag   : optional one-word floating punch label
         The <li> text is the explanation, usually one tight BLUF sentence. WHEN a beat has
         2–4 parallel sub-points, use a summary lead + bullets (the lead is still the BLUF):
           <li class="beat" ...><span class="lead">Summary line.</span><ul><li>point</li><li>point</li></ul></li>
         Don't default to bullets — prose is tighter; lists are for genuinely parallel points. -->
    <ol id="beats" hidden>
      <!-- <li class="beat" data-lines="40" data-mark="circle">Here's where we start: <code>lex()</code> turns raw input into tokens.</li> -->
    </ol>

    <div class="controlbar">
      <div class="progress" id="progress"></div>
      <span class="count" id="count">1 / N</span>
      <span class="push"></span>
      <button id="prev">◀ Prev</button>
      <button id="next" class="next">Next ▶</button>
      <button id="copy-all" title="Copy the whole lecture as numbered notes">⧉ copy transcript</button>
    </div>

    <!--
      ============================ AUTHORING STUB ============================
      Copy real code into #lines, then write one <li class="beat"> per step in #beats.
      Escape &lt; &gt; &amp; in code (in source: &amp;lt; &amp;gt; &amp;amp;).

      <div class="lines" id="lines">
        <div class="line" data-ln="39"><span class="ln">39</span><span class="code">  take() {</span></div>
        <div class="line" data-ln="40"><span class="ln">40</span><span class="code">    if (this.tokens &lt; 1) return false;</span></div>
        <div class="line" data-ln="41"><span class="ln">41</span><span class="code">    this.tokens -= 1;</span></div>
        <div class="line" data-ln="42"><span class="ln">42</span><span class="code">    return true;</span></div>
        <div class="line" data-ln="43"><span class="ln">43</span><span class="code">  }</span></div>
      </div>

      <ol id="beats" hidden>
        <li class="beat" data-lines="39" data-mark="underline" data-tag="entry"><code>take()</code> is the only way in — one call, one token.</li>
        <li class="beat" data-lines="40" data-mark="highlight" data-tag="the policy">Out of tokens, no entry: this one line is the entire rate limit.</li>
        <li class="beat" data-lines="40" data-to="42">It reports back with a return value, never an exception — callers must check it.</li>
        <li class="beat" data-lines="41-42" data-mark="box"><span class="lead">Past the guard, the request commits in order:</span><ul><li>spend one token</li><li>return <code>true</code></li></ul></li>
      </ol>
      =========================================================================
    -->

    <script>
      (function () {
        const root = document.documentElement;
        const $ = (s) => document.querySelector(s);
        const $$ = (s) => [...document.querySelectorAll(s)];
        const THEME_KEY = "visual-code-lecture-theme";
        const WRAP_KEY = "visual-code-lecture-wrap";

        // ---------- theme / wrap ----------
        function applyTheme(t) { root.dataset.theme = t; const b = $("#theme-toggle"); if (b) b.textContent = t === "dark" ? "☀" : "🌙"; }
        function applyWrap(on) { document.body.classList.toggle("wrap", on); $("#wrap-toggle")?.classList.toggle("active", on); reposition(); }
        applyTheme(localStorage.getItem(THEME_KEY) || "dark");
        $("#theme-toggle")?.addEventListener("click", () => { const n = root.dataset.theme === "dark" ? "light" : "dark"; applyTheme(n); localStorage.setItem(THEME_KEY, n); applyMarker(curMarker); });
        $("#wrap-toggle")?.addEventListener("click", () => { const on = !document.body.classList.contains("wrap"); applyWrap(on); localStorage.setItem(WRAP_KEY, on ? "on" : "off"); });

        // ---------- marker ink palette (the reader picks the highlight color; recolors every mark live) ----------
        const MARKER_KEY = "visual-code-lecture-marker";
        const PALETTE = [
          { name: "Azure",   d: "#38bdf8", l: "#0284c7" },
          { name: "Fuchsia", d: "#e879f9", l: "#c026d3" },
          { name: "Mint",    d: "#38d9a9", l: "#0ca678" },
          { name: "Violet",  d: "#a78bfa", l: "#7c3aed" },
          { name: "Rose",    d: "#fb7185", l: "#f43f5e" },
          { name: "Amber",   d: "#ffd43b", l: "#ffc53d" },
        ];
        let curMarker = 0;
        const markerHex = (i) => (root.dataset.theme === "dark" ? PALETTE[i].d : PALETTE[i].l);
        function applyMarker(i, redraw = true) {
          curMarker = i;
          root.style.setProperty("--mark", markerHex(i));
          $$("#swatches .swatch").forEach((s, k) => s.classList.toggle("active", k === i));
          if (redraw) reposition();
        }
        PALETTE.forEach((p, i) => {
          const b = document.createElement("button");
          b.className = "swatch"; b.title = p.name; b.style.setProperty("--sw", p.d);
          b.addEventListener("click", () => { applyMarker(i); localStorage.setItem(MARKER_KEY, String(i)); });
          $("#swatches")?.appendChild(b);
        });
        applyMarker((parseInt(localStorage.getItem(MARKER_KEY), 10) || 0), false);

        // ---------- rough.js renderer (embedded above) ----------
        const sketch = $("#sketch");
        const rc = rough.svg(sketch);
        const markColor = () => (getComputedStyle(root).getPropertyValue("--mark").trim() || "#ff7a7a");
        const isStacked = () => window.matchMedia("(max-width: 860px)").matches;
        function addNode(node, opts) {
          if (opts && opts.opacity != null) node.style.opacity = opts.opacity;
          sketch.appendChild(node);
          return [...node.querySelectorAll("path")];
        }

          paths.forEach((p, i) => {
            let len = 80; try { len = p.getTotalLength() || 80; } catch (e) {}
            p.style.strokeDasharray = len; p.style.strokeDashoffset = len; p.style.transition = "none";
            requestAnimationFrame(() => requestAnimationFrame(() => {

              p.style.strokeDashoffset = "0";
            }));

        // ---------- geometry: viewport coordinates (overlay is position:fixed) ----------
        function codeEls(nums) { return nums.map((n) => $(`.line[data-ln="${n}"] .code`)).filter(Boolean); }
        function vbox(els) {
          let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;

          const out = [];
          spec.split(",").forEach((part) => {
            part = part.trim();
            if (part.includes("-")) { const [a, b] = part.split("-").map((x) => parseInt(x, 10)); for (let i = a; i <= b; i++) out.push(i); }
            else if (part) out.push(parseInt(part, 10));

          return out;
        }

        // ---------- beats source + derived text ----------
        const beats = $$("#beats .beat");
        function refLabel(beat) {
          const nums = parseLines(beat.dataset.lines);
          if (!nums.length) return "";
          const a = nums[0], z = nums[nums.length - 1];
          let s = a === z ? `L${a}` : `L${a}–${z}`;

        }

        // ---------- build the scrolling note cards from the beats source ----------

          const num = document.createElement("span"); num.className = "note-num"; num.textContent = k + 1;   // this note's step number, for orientation

            parseLines(b.dataset.see).forEach((n) => {

            });

        // ---------- spotlight + scene drawing ----------
        function spotlight(nums) {

        }

              } else {

                const startY = up ? b.y0 - 6 : b.y1 + 6;

                paths.push(...addNode(rc.line(b.cx, edgeY, b.cx - 6, edgeY + (up ? 11 : -11), pen)));
                paths.push(...addNode(rc.line(b.cx, edgeY, b.cx + 6, edgeY + (up ? 11 : -11), pen)));
                const lab = document.createElement("span"); lab.className = "tag jump";
                lab.textContent = (up ? "↑ L" : "↓ L") + t2[0] + (t2.length > 1 ? "–" + t2[t2.length - 1] : "");
                lab.title = "jump to L" + t2[0];
                lab.addEventListener("click", () => jumpToLine(t2[0]));
                document.body.appendChild(lab);
                lab.style.left = Math.max(8, b.cx - lab.offsetWidth / 2) + "px";
                lab.style.top = (up ? edgeY + 4 : edgeY - 24) + "px";

              }
            }
          } else if (mark === "underline") { paths = addNode(rc.line(b.x0 - 2, b.y1 + 3, b.x1 + 2, b.y1 + 3, pen)); }
          else if (mark === "strike") { paths = addNode(rc.line(b.x0 - 2, b.cy, b.x1 + 2, b.cy, pen)); }
          else if (mark === "box") { paths = addNode(rc.rectangle(b.x0 - pad, b.y0 - pad + 2, b.w + pad * 2, b.h + pad * 2 - 4, pen)); }

          }
          if (animate) runAnim(paths);

          if (beat.dataset.tag) {
            const tag = document.createElement("span"); tag.className = "tag"; tag.textContent = beat.dataset.tag;
            document.body.appendChild(tag);
            tag.style.left = Math.min(b.x1 + 14, window.innerWidth - tag.offsetWidth - 8) + "px";
            tag.style.top = Math.max(b.y0 - 6, 56) + "px";
            requestAnimationFrame(() => tag.classList.add("show"));
          }
        }

        // ---------- active beat tracking ----------
        let cur = -1, programmatic = false, pTimer = 0, backTo = -1, backOn = -1;   // ONE back-link: return to beat backTo; its chip shows only on landing card backOn
        const backChip = document.createElement("button"); backChip.className = "back-chip";
        backChip.addEventListener("click", (e) => { e.stopPropagation(); goBack(); });   // stop bubbling so the host card doesn't also copy
        function nearestStep() {
          const cy = window.innerHeight * 0.42; let best = 0, bd = Infinity;
          steps.forEach((s, k) => { const r = s.getBoundingClientRect(); const c = (r.top + r.bottom) / 2; const d = Math.abs(c - cy); if (d < bd) { bd = d; best = k; } });
          return best;
        }
        // pan the (height-capped) code panel to the active beat. For a two-range (data-to) beat,
        // frame BOTH ends if their span fits; if it can't, keep the primary range centered (the
        // far end then renders as an off-screen edge marker in drawScene).
        const linesBox = $(".code-panel .lines");
        function lineEl(n) { return $(`.line[data-ln="${n}"]`); }
        function centerCode(beat) {
          if (!linesBox) return;
          const a = parseLines(beat.dataset.lines);
          const t = beat.dataset.to ? parseLines(beat.dataset.to) : [];
          const all = [...a, ...t].sort((x, y) => x - y);
          const primary = lineEl(a[0]); if (!primary) return;
          const br = linesBox.getBoundingClientRect();
          const firstEl = lineEl(all[0]) || primary, lastEl = lineEl(all[all.length - 1]) || primary;
          const spanH = lastEl.getBoundingClientRect().bottom - firstEl.getBoundingClientRect().top;
          let center;
          if (spanH <= linesBox.clientHeight - 24) {
            const fr = firstEl.getBoundingClientRect(), lr = lastEl.getBoundingClientRect();
            center = (fr.top + lr.bottom) / 2;            // both ends fit — frame their midpoint
          } else {
            const pr = primary.getBoundingClientRect();
            center = (pr.top + pr.bottom) / 2;            // can't fit both — keep primary centered
          }
          const delta = (center - br.top) - linesBox.clientHeight / 2;
          if (Math.abs(delta) > 2) linesBox.scrollTo({ top: linesBox.scrollTop + delta, behavior: "smooth" });
        }
        function setActive(k) {
          k = Math.max(0, Math.min(beats.length - 1, k));
          const changed = k !== cur; cur = k;
          steps.forEach((s, i) => { const on = i === k; s.classList.toggle("active", on); cards[i].title = on ? "click to copy this step" : "click to focus this step"; });
          const beat = beats[k];
          const nums = parseLines(beat.dataset.lines);
          const focus = beat.dataset.to ? [...nums, ...parseLines(beat.dataset.to)] : nums;
          spotlight(focus);
          centerCode(beat);
          drawScene(k, changed);
          $("#count").textContent = `${k + 1} / ${beats.length}`;
          $("#prev").disabled = k === 0; $("#next").disabled = k === beats.length - 1;
          $$("#progress .dot").forEach((d, i) => { d.classList.toggle("current", i === k); d.classList.toggle("done", i < k); });
          updateBackBtn();   // show the ↩ back chip if this newly-focused card is the one it belongs to
        }
        function reposition() { if (cur >= 0) drawScene(cur, false); }
        function jumpTo(k, record = true) {
          k = Math.max(0, Math.min(beats.length - 1, k));
          if (record && cur >= 0 && k !== cur) { backTo = cur; backOn = k; }   // a jump (not sequential ◀ ▶) sets THE back-link; a later jump replaces it, so it never accumulates
          programmatic = true; clearTimeout(pTimer); pTimer = setTimeout(() => (programmatic = false), 680); setActive(k); cards[k].scrollIntoView({ block: "center", behavior: "smooth" });
        }
        function goBack() { if (backTo < 0) return; const o = backTo; backTo = backOn = -1; jumpTo(o, false); }
        // the "↩ back" chip shows on EXACTLY one card — the landing card of the most recent jump — labelled by the origin's line, matching the ↗ jump chips
        function updateBackBtn() {
          if (backTo < 0 || cur !== backOn) { backChip.remove(); return; }
          backChip.textContent = "↩ back to L" + parseLines(beats[backTo].dataset.lines)[0];
          if (cards[cur] && backChip.parentElement !== cards[cur]) cards[cur].appendChild(backChip);   // bottom of the note, below its ↗ chips
        }
        // jump to whatever beat owns line n (the clean case); if no beat focuses it, peek the line and flash it
        function jumpToLine(n) {
          let k = beats.findIndex((b) => parseLines(b.dataset.lines).includes(n));
          if (k < 0) k = beats.findIndex((b) => b.dataset.to && parseLines(b.dataset.to).includes(n));
          if (k >= 0) { jumpTo(k); return; }
          const el = lineEl(n);
          if (el && linesBox) {
            const br = linesBox.getBoundingClientRect(), er = el.getBoundingClientRect();
            linesBox.scrollTo({ top: linesBox.scrollTop + (er.top - br.top) - (linesBox.clientHeight / 2 - er.height / 2), behavior: "smooth" });
            el.classList.add("flash-line"); setTimeout(() => el.classList.remove("flash-line"), 1100);
          }
        }

        let ticking = false;
        window.addEventListener("scroll", () => {
          if (ticking) return; ticking = true;
          requestAnimationFrame(() => {
            ticking = false;
            if (programmatic) { reposition(); return; }
            const k = nearestStep();
            if (k !== cur) setActive(k); else reposition();
          });
        }, { passive: true });
        // the code panel scrolls internally (pans to the active line) — re-glue marks while it moves
        let lticking = false;
        linesBox?.addEventListener("scroll", () => {
          if (lticking) return; lticking = true;
          requestAnimationFrame(() => { lticking = false; reposition(); });
        }, { passive: true });
        let rzt; window.addEventListener("resize", () => { clearTimeout(rzt); rzt = setTimeout(() => { lastKey = ""; if (cur >= 0) centerCode(beats[cur]); reposition(); }, 120); });

        // ---------- controls ----------
        $("#prev").addEventListener("click", () => jumpTo(cur - 1, false));
        $("#next").addEventListener("click", () => jumpTo(cur + 1, false));
        $$(".line").forEach((l) => { l.addEventListener("click", () => { const ln = parseInt(l.dataset.ln, 10); const k = beats.findIndex((b) => parseLines(b.dataset.lines).includes(ln)); if (k >= 0) jumpTo(k); }); });
        document.addEventListener("keydown", (e) => {
          if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); jumpTo(cur + 1, false); }
          else if (e.key === "ArrowLeft") { e.preventDefault(); jumpTo(cur - 1, false); }
          else if (e.key === "Home") jumpTo(0);
          else if (e.key === "End") jumpTo(beats.length - 1);
        });
        $("#copy-all").addEventListener("click", () => {
          const subj = ($("[data-subject]")?.textContent || "").trim();
          const lines = beats.map((b, i) => { const { lead, points } = beatParts(b); let s = `${i + 1}. [${refLabel(b)}] ${lead}`; for (const p of points) s += `\n   - ${p}`; return s; });
          copyText((subj ? `# ${subj}\n\n` : "") + lines.join("\n"));
          const btn = $("#copy-all"); btn.classList.add("flash"); setTimeout(() => btn.classList.remove("flash"), 900);
        });

        applyWrap(localStorage.getItem(WRAP_KEY) === "on");
        if (beats.length) { setActive(0); requestAnimationFrame(() => drawScene(0, true)); }
        else { $("#count").textContent = "0 / 0"; }
      })();
    </script>
  </body>
</html>
